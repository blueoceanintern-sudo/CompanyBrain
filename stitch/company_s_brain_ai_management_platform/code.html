<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - Company's Brain</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface": "#f8f9ff",
                        "on-secondary": "#ffffff",
                        "surface-bright": "#f8f9ff",
                        "on-error": "#ffffff",
                        "surface-container-low": "#eff4ff",
                        "on-surface": "#0b1c30",
                        "on-surface-variant": "#434655",
                        "error": "#ba1a1a",
                        "on-tertiary-fixed": "#360f00",
                        "on-tertiary-fixed-variant": "#7d2d00",
                        "inverse-on-surface": "#eaf1ff",
                        "on-secondary-fixed-variant": "#40484f",
                        "on-secondary-fixed": "#151c23",
                        "primary-fixed": "#dbe1ff",
                        "on-primary-fixed-variant": "#003ea8",
                        "tertiary": "#943700",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-container": "#ffede6",
                        "tertiary-fixed-dim": "#ffb596",
                        "secondary-fixed-dim": "#c0c7d0",
                        "surface-container": "#e5eeff",
                        "on-primary-container": "#eeefff",
                        "primary-fixed-dim": "#b4c5ff",
                        "secondary": "#585f67",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed": "#ffdbcd",
                        "background": "#f8f9ff",
                        "surface-variant": "#d3e4fe",
                        "surface-container-highest": "#d3e4fe",
                        "on-primary-fixed": "#00174b",
                        "inverse-primary": "#b4c5ff",
                        "inverse-surface": "#213145",
                        "on-error-container": "#93000a",
                        "primary-container": "#2563eb",
                        "outline-variant": "#c3c6d7",
                        "secondary-fixed": "#dce3ec",
                        "surface-container-high": "#dce9ff",
                        "surface-dim": "#cbdbf5",
                        "error-container": "#ffdad6",
                        "on-secondary-container": "#5e656d",
                        "primary": "#004ac6",
                        "outline": "#737686",
                        "on-primary": "#ffffff",
                        "secondary-container": "#dce3ec",
                        "surface-tint": "#0053db",
                        "tertiary-container": "#bc4800",
                        "on-background": "#0b1c30"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "margin-desktop": "32px",
                        "margin-mobile": "16px",
                        "unit": "4px",
                        "sidebar-width": "280px",
                        "gutter": "24px"
                    },
                    "fontFamily": {
                        "label-sm": ["Be Vietnam Pro"],
                        "headline-lg-mobile": ["Be Vietnam Pro"],
                        "body-lg": ["Be Vietnam Pro"],
                        "label-md": ["Be Vietnam Pro"],
                        "body-md": ["Be Vietnam Pro"],
                        "headline-md": ["Be Vietnam Pro"],
                        "headline-sm": ["Be Vietnam Pro"],
                        "headline-lg": ["Be Vietnam Pro"],
                        "display": ["Be Vietnam Pro"]
                    },
                    "fontSize": {
                        "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                        "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "600"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "label-md": ["14px", {"lineHeight": "20px", "fontWeight": "500"}],
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                        "display": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
                    }
                }
            }
        }

<style>
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .login-card-shadow {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-4">
<!-- Main Container -->
<main class="w-full max-w-[440px] flex flex-col items-center">
<!-- Branding Section -->
<div class="mb-10 text-center">
<div class="inline-flex items-center justify-center w-14 h-14 bg-primary rounded-xl mb-6">
<span class="material-symbols-outlined text-on-primary text-[32px]" data-icon="hub" style="font-variation-settings: 'FILL' 1;">hub</span>
</div>
<h1 class="font-headline-md text-headline-md text-on-surface mb-2">Company's Brain</h1>
<p class="font-body-md text-body-md text-on-surface-variant">BlueOcean Intelligent Ecosystem</p>
</div>
<!-- Login Card -->
<div class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl p-8 login-card-shadow">
<form class="space-y-6" id="loginForm" onsubmit="return false;">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant block" for="email">Email Address</label>
<div class="relative">
<input class="w-full h-12 px-4 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline transition-all duration-200 focus:outline-none focus:border-primary-container focus:ring-2 focus:ring-primary-container/20" id="email" name="email" placeholder="name@blueocean.edu" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant block" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:underline transition-all" href="#">Forgot password?</a>
</div>
<div class="relative">
<input class="w-full h-12 px-4 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline transition-all duration-200 focus:outline-none focus:border-primary-container focus:ring-2 focus:ring-primary-container/20" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant" id="togglePassword" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-2">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary-container/20" id="remember" type="checkbox"/>
<label class="font-body-md text-body-md text-on-surface-variant cursor-pointer select-none" for="remember">Remember this device</label>
</div>
<!-- Primary CTA -->
<button class="w-full h-12 bg-primary-container text-on-primary font-label-md text-label-md rounded-lg hover:opacity-90 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2" type="submit">
                    Sign in
                    <span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
</div>
<!-- Secondary Info -->
<div class="mt-8 text-center space-y-4">
<p class="font-body-md text-body-md text-on-surface-variant">
                Don't have an account? 
                <a class="text-primary font-label-md hover:underline" href="#">Contact Administrator</a>
</p>
<div class="flex items-center justify-center gap-6 pt-4">
<a class="font-label-sm text-label-sm text-outline hover:text-on-surface-variant transition-colors" href="#">Privacy Policy</a>
<span class="w-1 h-1 bg-outline rounded-full"></span>
<a class="font-label-sm text-label-sm text-outline hover:text-on-surface-variant transition-colors" href="#">Terms of Service</a>
<span class="w-1 h-1 bg-outline rounded-full"></span>
<a class="font-label-sm text-label-sm text-outline hover:text-on-surface-variant transition-colors" href="#">System Status</a>
</div>
</div>
</main>
<script>
        // Micro-interactions for login page
        document.addEventListener('DOMContentLoaded', () => {
            const toggleBtn = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('password');
            const loginForm = document.getElementById('loginForm');

            // Password visibility toggle
            toggleBtn.addEventListener('click', () => {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                
                const icon = toggleBtn.querySelector('.material-symbols-outlined');
                icon.textContent = type === 'password' ? 'visibility' : 'visibility_off';
            });

            // Submit loading state simulation
            loginForm.addEventListener('submit', (e) => {
                const btn = e.target.querySelector('button[type="submit"]');
                const originalContent = btn.innerHTML;
                
                btn.disabled = true;
                btn.innerHTML = '<span class="animate-spin material-symbols-outlined">progress_activity</span>';
                
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerHTML = originalContent;
                    alert('Integration Success: Authentication system ready.');
                }, 1500);
            });
        });
    </script>
</body></html>
